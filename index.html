<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message For Fayko 💗</title>

<style>
:root{
--peach:#ffdab9;
--dark-peach:#fbc4ab;
--pink:#ffb7c5;
--light-pink:#ffe5ec;
--text-color:#7a4a4a;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
overflow:hidden;
background:#fff0f3;
height:100vh;
width:100vw;
}

/* background */
#background-carnations{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
background:linear-gradient(45deg,#ffe5ec 25%,transparent 25%) -50px 0,
linear-gradient(-45deg,#ffe5ec 25%,transparent 25%) -50px 0,
linear-gradient(45deg,transparent 75%,#ffe5ec 75%),
linear-gradient(-45deg,transparent 75%,#ffe5ec 75%);
background-size:100px 100px;
background-color:#fff0f3;
opacity:.6;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.2);
z-index:-1;
}

/* flower animation */
.flower{
position:fixed;
bottom:-40px;
font-size:22px;
animation:flowerFloat linear infinite;
pointer-events:none;
opacity:.9;
}

@keyframes flowerFloat{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

/* container */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
transition:opacity 1s ease-out;
}

.letter-box{
background:var(--dark-peach);
color:var(--text-color);
padding:2rem;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
max-width:600px;
width:100%;
max-height:80vh;
display:flex;
flex-direction:column;
text-align:center;
}

h1{
font-size:clamp(1.5rem,5vw,2.5rem);
margin-bottom:.5rem;
color:#d63384;
}

h2{
font-size:clamp(1rem,3vw,1.5rem);
margin-bottom:1.5rem;
font-weight:300;
}

.scrollable-letter{
flex-grow:1;
overflow-y:auto;
margin-bottom:1.5rem;
padding:10px;
font-size:clamp(1rem,2.5vw,1.2rem);
line-height:1.6;
text-align:left;
border-top:1px solid rgba(255,255,255,.3);
border-bottom:1px solid rgba(255,255,255,.3);
}

/* button */

.btn-surprise{
background:#d63384;
color:white;
border:none;
padding:15px 30px;
border-radius:50px;
font-size:1.1rem;
cursor:pointer;
transition:transform .3s,background .3s;
margin-top:10px;
box-shadow:0 4px 15px rgba(214,51,132,.3);
}

.btn-surprise:hover{
transform:scale(1.05);
background:#b82a6e;
}

/* scene */

#surprise-scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
}

#heart-container{
position:relative;
width:300px;
height:300px;
animation:rotateHeart 12s linear infinite;
}

@keyframes rotateHeart{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FAYKO TEXT */

.fayko-text{
position:absolute;
font-size:12px;
color:#ff69b4;
font-weight:bold;
text-shadow:
0 0 5px #ff69b4,
0 0 15px #ff69b4,
0 0 25px #ff1493;
animation:faykoGlow 2s ease-in-out infinite;
}

@keyframes faykoGlow{
0%,100%{
opacity:.7;
transform:scale(1);
}
50%{
opacity:1;
transform:scale(1.25);
}
}

/* cake */

.cake-center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
z-index:10;
animation:cakeGlow 2s ease-in-out infinite;
}

@keyframes cakeGlow{
0%,100%{
filter:drop-shadow(0 0 10px #fff);
}
50%{
filter:drop-shadow(0 0 30px gold);
transform:translate(-50%,-50%) scale(1.1);
}
}

/* sparkles */

.sparkle{
position:absolute;
background:white;
border-radius:50%;
pointer-events:none;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0) scale(0);
opacity:0;
}
50%{opacity:1;}
100%{
transform:translateY(-100vh) scale(1);
opacity:0;
}
}

</style>
</head>

<body>

<div id="background-carnations"></div>
<div id="overlay"></div>

<div class="container" id="letter-container">
<div class="letter-box">

<h1>A MESSAGE FOR YOU 💗</h1>
<h2>From Peanut</h2>

<div class="scrollable-letter">
<p>Dear Fayko,</p><br>
<p>I just wanted to take a moment to tell you how much our friendship means to me.</p><br>
<p>Thank you for being the amazing person you are.</p><br>
<p>I hope this surprise makes you smile today.</p><br>
<p>With lots of love,</p>
<p>Peanut</p>
</div>

<button class="btn-surprise" onclick="showSurprise()">Open Your Surprise 🎁</button>

</div>
</div>

<div id="surprise-scene">
<div id="heart-container">
<div class="cake-center">🎂</div>
</div>
</div>

<script>

function showSurprise(){

document.getElementById('letter-container').style.opacity='0';

setTimeout(()=>{
document.getElementById('letter-container').style.display='none'
document.getElementById('surprise-scene').style.display='flex'

createHeart()
createSparkles()

},1000)

}

/* heart text */

function createHeart(){

const container=document.getElementById('heart-container')

const points=90
const scale=10

for(let i=0;i<points;i++){

const t=(i/points)*Math.PI*2

const x=16*Math.pow(Math.sin(t),3)
const y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

const span=document.createElement('span')

span.className='fayko-text'
span.innerText='FAYKO'

span.style.left=(x*scale+150)+'px'
span.style.top=(y*scale+150)+'px'

span.style.animationDelay=(i*0.05)+'s'

container.appendChild(span)

}

}

/* sparkles */

function createSparkles(){

const scene=document.getElementById('surprise-scene')

setInterval(()=>{

const sparkle=document.createElement('div')

sparkle.className='sparkle'

const size=Math.random()*5+2

sparkle.style.width=size+'px'
sparkle.style.height=size+'px'

sparkle.style.left=Math.random()*100+'vw'
sparkle.style.top='100vh'

sparkle.style.animationDuration=(Math.random()*3+2)+'s'

scene.appendChild(sparkle)

setTimeout(()=>sparkle.remove(),5000)

},200)

}

/* flowers floating */

function createFlowers(){

setInterval(()=>{

const flower=document.createElement("div")

flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"

flower.style.animationDuration=(Math.random()*6+6)+"s"

document.body.appendChild(flower)

setTimeout(()=>{
flower.remove()
},12000)

},500)

}

createFlowers()

</script>

</body>
</html>
